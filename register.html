<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | TheSuftMedia</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <main class="auth-page">

  <div class="auth-logo">
    <a href="index.html" class="auth-logo-link">
      <div class="logo-icon">
        <span>T</span>
      </div>

      <div class="logo-text">
        <span class="logo-name">TheSuft</span>
        <span class="logo-sub">Media</span>
      </div>
    </a>
  </div>

  <div class="auth-container">

    <h1>Create your account</h1>

    <p class="auth-subtitle">
      Join TheSuftMedia and get started
    </p>

    <button
    type="button"
    class="google-btn"
    id="googleRegister">

      <svg width="22" height="22" viewBox="0 0 48 48">
        <path fill="#FFC107"
        d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.4-.4-3.5z"/>

        <path fill="#FF3D00"
        d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>

        <path fill="#4CAF50"
        d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2c-2.1 1.5-4.7 2.4-7.3 2.4-5.3 0-9.8-3.3-11.4-8l-6.6 5.1C9.2 39.6 16 44 24 44z"/>

        <path fill="#1976D2"
        d="M43.6 20.5H42V20H24v8h11.3c-1.1 3-3.3 5.3-6.2 6.8l6.2 5.2C39.6 36.1 44 30.7 44 24c0-1.3-.1-2.4-.4-3.5z"/>
      </svg>

      <span>Continue with Google</span>

    </button>

    <div class="divider">
      <span>or sign up with email</span>
    </div>

    <form class="auth-form" id="registerForm">

      <div class="name-grid">

        <div class="input-group">
          <label>First name</label>
          <input
            type="text"
           id="firstName"
              placeholder="John"
          >
        </div>

        <div class="input-group">
          <label>Last name</label>
          <input
            type="text"
            id="lastName"
              placeholder="Doe"
          >
        </div>

      </div>

      <div class="input-group">
        <label>Email</label>

        <input
          type="email"
          id="email"
            placeholder="you@example.com"
        >
      </div>

      <div class="input-group">

        <label>Password</label>

        <div class="password-box">

          <input
            type="password"
            id="password"
              placeholder="min. 8 characters"
          >

          <button
    type="button"
    class="toggle-password">

    <i class="fa-regular fa-eye"></i>

</button>

        </div>

      </div>

      <button class="primary-btn">
        Create account
      </button>

    </form>

    <p class="auth-switch">
      Already have an account?
      <a href="login.html">Sign in</a>
    </p>

  </div>

</main>
<script type="module" src="firebase.js"></script>
<script type="module" src="register.js"></script>
</body>
</html>
