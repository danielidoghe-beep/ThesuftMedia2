<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates | TheSuftMedia</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="sidebar-overlay"></div>

<aside class="dashboard-sidebar">

    <div class="sidebar-logo">
        <h2>TheSuftMedia</h2>
    </div>

    <h4>MAIN</h4>

    <a href="dashboard.html">
        <i class="fa-solid fa-table-cells"></i>
        Dashboard
    </a>

    <a href="wallet.html">
        <i class="fa-solid fa-wallet"></i>
        Wallet
    </a>

    <a href="orders.html">
        <i class="fa-regular fa-folder-open"></i>
        Orders
    </a>

    <a href="transactions.html">
        <i class="fa-solid fa-receipt"></i>
        Transactions
    </a>

    <a href="notifications.html">
        <i class="fa-regular fa-bell"></i>
        Notifications
    </a>

    <h4>STORE</h4>

    <a href="logs.html">
        <i class="fa-solid fa-box"></i>
        Logs Store
    </a>

    <a href="updates.html" class="active">
        <i class="fa-solid fa-image"></i>
        Updates
    </a>

</aside>

<div class="dashboard">

<header class="dashboard-header">

<button class="menu-btn" id="menuBtn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="header-right">

<div class="wallet-pill" id="walletPill">
₦0
</div>

<button class="theme-btn" id="themeToggle">
<i class="fa-regular fa-sun"></i>
</button>

<a href="notifications.html" class="notify-btn">
<i class="fa-regular fa-bell"></i>

<span id="notificationBadge" class="notification-badge">
0
</span>

</a>

<a href="profile.html" class="profile-avatar">
DD
</a>

</div>

</header>

<main class="updates-content">

    <section class="updates-header">

        <h1>Tools Store</h1>

        <p>Updates, picture sets, and more</p>

    </section>

    <!-- Search -->
    <div class="updates-search">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            id="searchUpdates"
            placeholder="Search tools...">

    </div>

    <!-- Counter -->
    <div class="updates-counter">

        <strong id="updatesCount">0</strong>

        <span>tools available</span>

    </div>

    <!-- Categories -->

    <div class="update-tabs">

        <button class="tab-btn active"
                data-category="all">

            All

            <span id="allCount">0</span>

        </button>

        <button class="tab-btn"
                data-category="pictures">

            Working Pictures

            <span id="pictureCount">0</span>

        </button>

        <button class="tab-btn"
                data-category="tools">

            Working Tools

            <span id="toolCount">0</span>

        </button>

    </div>

    <!-- Updates -->

    <div id="updatesContainer">

        <div class="empty-updates">

            <i class="fa-regular fa-folder-open"></i>

            <h3>No Updates Available</h3>

            <p>
                New updates uploaded by the administrator
                will appear here automatically.
            </p>

        </div>

    </div>
<script type="module" src="dashboard.js"></script>
<script type="module" src="updates.js"></script>
<script type="module" src="notification-badge.js"></script>
</main>
