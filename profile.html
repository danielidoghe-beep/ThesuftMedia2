<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | TheSuftMedia</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="profile.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="sidebar-overlay"></div>

<aside class="dashboard-sidebar">

<div class="sidebar-logo">
<h2>TheSuftMedia</h2>
</div>

<h4>MAIN</h4>

<a href="dashboard.html">
<i class="fa-solid fa-table-cells"></i>
Dashboard
</a>

<a href="wallet.html">
<i class="fa-solid fa-wallet"></i>
Wallet
</a>

<a href="orders.html">
<i class="fa-regular fa-folder-open"></i>
Orders
</a>

<a href="transactions.html">
<i class="fa-solid fa-receipt"></i>
Transactions
</a>

<a href="notifications.html">
<i class="fa-regular fa-bell"></i>
Notifications
</a>

<h4>ACCOUNT</h4>

<a href="profile.html" class="active">
<i class="fa-regular fa-user"></i>
Profile
</a>

<a href="#" id="logoutBtn">
<i class="fa-solid fa-right-from-bracket"></i>
Sign out
</a>

</aside>

<div class="dashboard">

<header class="dashboard-header">

<button class="menu-btn" id="menuBtn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="header-right">

<div class="wallet-pill" id="walletPill">
₦0
</div>

<button id="themeToggle" class="theme-btn">
<i class="fa-regular fa-sun"></i>
</button>

<a href="notifications.html" class="notify-btn">

<i class="fa-regular fa-bell"></i>

<span id="notificationBadge" class="notification-badge"></span>

</a>

<a href="profile.html" class="profile-avatar" id="profileAvatar"></a>

</div>

</header>

<main class="profile-page">

<h1>Profile</h1>

<p>Manage your account details</p>

<div class="profile-card">

<h2>Account</h2>

<p>Your public profile information</p>

<br>

<div class="profile-center">

<div class="profile-avatar-new" id="bigAvatar">
    DD

<div class="avatar-camera">
    <i class="fa-solid fa-camera"></i>
</div>

<h2 id="profileName">Loading...</h2>

<p id="profileEmail">Loading...</p>

<p class="photo-note">
    Click the camera to change your photo
</p>

<hr class="profile-divider">

</div>

<form id="profileForm">

<label>First name</label>

<input
type="text"
id="firstName"
required>

<label>Last name</label>

<input
type="text"
id="lastName"
required>

<label>Email</label>

<input
type="email"
id="email"
disabled>

<br>

<button type="submit" class="primary-btn">
    Save Changes
</button>

</form>

</div>

<div class="dashboard-card">

<h2>Password</h2>

<p>Change your login password</p>

<form id="passwordForm" class="profile-form">

<label>New Password</label>

<input
type="password"
id="newPassword"
required>

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
required>

<br>

<button type="submit" class="primary-btn">
    Update Password
</button>

</form>

</div>

</main>

</div>

<script type="module" src="profile.js"></script>
<script type="module" src="notification-badge.js"></script>

</body>
</html>
